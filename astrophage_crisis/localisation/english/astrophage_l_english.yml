l_english:
 # Events
 astrophage.20.name: "The Dimming Star"
 astrophage.20.desc: "Our astronomers report something impossible: the star's output is declining measurably month over month. Spectral analysis reveals a faint infrared line at 25.984 microns emanating from a migration of... something... between the star and its neighbors. Whatever it is, it is alive, it is feeding, and it is breeding."
 astrophage.20.a: "Begin research immediately."
 astrophage.20.b: "This is not our problem."
 astrophage.30.name: "A Galactic Emergency"
 astrophage.30.desc: "The star-eating organism, now designated 'astrophage,' has spread beyond containment by any single empire. The Galactic Community may now vote on a Joint Research Program."
 astrophage.30.a: "Convene the Senate."
 astrophage.40.name: "The Predator"
 astrophage.40.desc: "Deep within a dimmed system, our scientists have isolated a microbe that preys on astrophage. Deployed carelessly, it will consume our own harvested stockpiles just as eagerly."
 astrophage.40.a: "Deploy it now, everywhere."
 astrophage.40.b: "Refine it first. Do this right."
 astrophage.50.name: "The Stars Rekindled"
 astrophage.50.desc: "The counter-agent has done its work. Across the galaxy, infested stars are brightening once more."
 astrophage.50.a: "A victory for all life."
 astrophage.51.name: "Power Harnessed"
 astrophage.51.desc: "We have not destroyed the astrophage. We have domesticated it. Contained blooms in our space now yield the most energy-dense fuel ever known."
 astrophage.51.a: "The galaxy will envy us."
 # Situation
 astrophage_research_situation: "Astrophage Crisis"
 astrophage_research_situation_desc: "A star-consuming organism is spreading through the galaxy. Research it. Stop it. Or master it."
 astrophage_approach_fund: "Fund Crash Research"
 astrophage_approach_fund_desc: "Divert energy credits into round-the-clock astrophage research."
 astrophage_approach_observe: "Observe"
 astrophage_approach_observe_desc: "Study the organism passively as data becomes available."
 astrophage_approach_harness: "Harness"
 astrophage_approach_harness_desc: "Do not destroy it. Tame it. Slower - but the power will be ours alone."
 astrophage_stage_1_end: "Complete detection and sampling of astrophage."
 # Resolution
 resolution_astrophage_research_program: "Joint Astrophage Research Program"
 resolution_astrophage_research_program_desc: "Pool the Community's scientific resources. All member empires gain greatly accelerated progress against the astrophage."
 # Modifiers
 astrophage_dimming_1: "Astrophage Bloom (Stage I)"
 astrophage_dimming_1_desc: "The star is dimming. Energy output in this system is falling."
 astrophage_dimming_2: "Astrophage Bloom (Stage II)"
 astrophage_dimming_2_desc: "The star has visibly darkened. Worlds here grow cold."
 astrophage_dimming_3: "Astrophage Bloom (Stage III)"
 astrophage_dimming_3_desc: "The star is dying. Evacuation is strongly advised."
 # Resources & tech
 sr_astrophage: "Astrophage"
 sr_astrophage_desc: "A living fuel of unmatched energy density. Handle with respect."
 tech_astrophage_containment: "Astrophage Containment Protocols"
 tech_astrophage_harvesting: "Astrophage Cultivation"
 tech_astrophage_spin_drive: "Spin Drive Propulsion"
 ASTROPHAGE_SPIN_DRIVE_1: "Astrophage Spin Drive"
 ASTROPHAGE_SPIN_DRIVE_1_DESC: "Thrusters that annihilate astrophage for propulsion, achieving relativistic-class sublight performance."
